version: 48
jobs:
- name: ci
  steps:
  - type: PullRepository
    name: pull
    remoteUrl: http://localhost:6610/test
    userName: admin
    passwordSecret: access token
    refs: refs/heads/* refs/tags/*
    withLfs: false
    force: false
    condition: SUCCESSFUL
    optional: false
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
